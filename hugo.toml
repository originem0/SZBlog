baseURL = 'https://sharonzhou.site/'
languageCode = 'zh-cn'
title = 'My Blog'
theme = 'PaperMod'
enableGitInfo = true

[frontmatter]
date = ['date',':git'] 
lastmod = [':git']

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  author = "sharon"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowShareButtons = false
  ShowCodeCopyButtons = true
  comments = true

[params.label]
  icon = "/logo.png"
  iconHeight = 30

[params.homeInfoParams]
  Title = "Welcome"
  Content = "个人博客"

[[menus.main]]
  name = "文章"
  url = "/posts/"
  weight = 1

[[menus.main]]
  name = "归档"
  url = "/archives/"
  weight = 2

[[menus.main]]
  name = "搜索"
  url = "/search/"
  weight = 3

[[menus.main]]
  name = "关于"
  url = "/about/"
  weight = 4
