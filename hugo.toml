baseURL = 'https://sharonzhou.site/'
languageCode = 'zh-cn'
title = 'Sharon 的博客'
theme = 'PaperMod'
enableGitInfo = true
buildFuture = true
paginate = 20

[frontmatter]
date = ['date',':git'] 
lastmod = [':git']

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  description = "个人技术博客，记录 AI、建站与方法论"
  defaultTheme = "auto"
  mainSections = ["posts", "ai-daily", "thoughts"]
  author = "Sharon"
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowShareButtons = false
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = true
  comments = true

[params.label]
  icon = "/logo.png"
  iconHeight = 30

[params.homeInfoParams]
  Title = "Welcome"
  Content = "写作，坐在椅子前的艺术"

[[menus.main]]
  name = "文章"
  url = "/posts/"
  weight = 1

[[menus.main]]
  name = "AI 日报"
  url = "/ai-daily/"
  weight = 2

[[menus.main]]
  name = "想法"
  url = "/thoughts/"
  weight = 3

[[menus.main]]
  name = "归档"
  url = "/archives/"
  weight = 4

[[menus.main]]
  name = "搜索"
  url = "/search/"
  weight = 5

[[menus.main]]
  name = "关于"
  url = "/about/"
  weight = 6

[markup.highlight]
  noClasses = false

[markup.goldmark.renderer]
  unsafe = true
